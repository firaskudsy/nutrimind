# NutriMind — self-hosted stack. `docker compose up --build` runs everything:
# Postgres + Cronometer MCP + the Telegram bot (agent, scheduler, Google Health).
name: nutrimind
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nutrimind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-nutrimind}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutrimind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cronometer-mcp:
    build: ./mcp/cronometer
    restart: unless-stopped
    env_file: .env
    environment:
      # Reachable only on the internal compose network — allow the service hostname.
      MCP_DNS_REBINDING_PROTECTION: "false"

  # The Telegram bot: agent (LiteLLM) + proactive scheduler + Google Health (npx).
  bot:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Reach the Cronometer MCP by service name inside the compose network.
      CRONOMETER_MCP_URL: http://cronometer-mcp:8001/mcp
      # Use the Postgres container (overrides the SQLite default from .env).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nutrimind}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-nutrimind}
      # Ollama runs natively on the Mac host (for GPU access), not in this
      # compose stack -- host.docker.internal reaches it from the container.
      AGENT_API_BASE: http://host.docker.internal:11434
    command: ["python", "-m", "app.telegram_bot"]
    depends_on:
      db:
        condition: service_healthy
      cronometer-mcp:
        condition: service_started
    volumes:
      # Google Health OAuth tokens/config (from `./run.sh auth`). If absent, the
      # agent simply skips Google Health.
      - ${HOME}/.google-health-mcp:/root/.google-health-mcp

  # FastAPI backend — serves the web app's API (/api/*). Shares the DB + agent
  # with the Telegram bot.
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      CRONOMETER_MCP_URL: http://cronometer-mcp:8001/mcp
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nutrimind}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-nutrimind}
      AGENT_API_BASE: http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
      cronometer-mcp:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ${HOME}/.google-health-mcp:/root/.google-health-mcp

  # Web app (React) served by nginx, which proxies /api to the backend.
  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
