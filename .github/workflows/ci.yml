name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Backend — lint & test
        working-directory: backend
        run: |
          uv sync
          uv run ruff check .
          uv run pytest -q

      - name: Cronometer MCP — lint
        working-directory: mcp/cronometer
        run: |
          uv sync
          uv run ruff check src/
